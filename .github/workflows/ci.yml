# CI: Lint, typecheck, tests, and build on pull requests and pushes to main
# Fails on any step. No secrets required for build; uses placeholder env.

name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:ci

      - name: Type check
        run: npm run typecheck

      - name: Admin integration tests
        run: npm run test:admin

      - name: Architecture guards
        run: npm run test:guards

      - name: Migration safety check
        run: npm run check:migrations

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder

      - name: Verify Vercel domain (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm run verify-domain
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_NAME: inthecircle-web-v2
