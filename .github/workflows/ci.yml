# CI: Lint, typecheck, and build on pull requests and pushes to main
# No secrets required; uses placeholder env for next build.

name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # Placeholders so next build runs without real secrets (CI only).
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder

      # On push to main: verify app.inthecircle.co is only on inthecircle-web (set VERCEL_TOKEN in repo secrets for this step).
      - name: Verify Vercel domain (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm run verify-domain
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
